name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "871806636838"
  ECR_REPOSITORY_NAME: nhl-excit-o-meter-be
  VERSION: ${{ github.sha }}

jobs:
  tests-docker-build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-json-ctrf
    - name: Test with pytest
      run: |
        pytest --ctrf report.json 
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 24
    - name: Publish Test Summary Results
      run: npx github-actions-ctrf report.json    

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ env.AWS_REGION }}
        role-to-assume: arn:aws:iam::871806636838:role/github-actions
        role-session-name: github-actions-ecr

    - name: Verify AWS identity
      run: aws sts get-caller-identity

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build image
      run: |
        docker build \
          -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_NAME }}:${{ env.VERSION }} \
          .

    - name: Push image
      run: |
        docker push \
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_NAME }}:${{ env.VERSION }}

    - name: Image pushed
      run: |
        echo "Image pushed to ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_NAME }}:${{ env.VERSION }}"
